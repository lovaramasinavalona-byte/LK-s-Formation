<script>
    /* LK's FORMATION - CORE SYSTEM V6.2 
       Optimisation 2026 : Validation sémantique et relances client
    */
    const Manager = {
        scenarios: [],
        // Dictionnaire de synonymes pour une validation flexible
        lexique: {
            accueil: ["bonjour", "bienvenue", "enchanté", "service", "lk", "aider", "écoute"],
            empathie: ["comprends", "navré", "désolé", "excuse", "regrette", "entends", "rassurez"],
            action: ["vérifie", "dossier", "regarde", "instant", "attente", "recherche", "consulte"],
            resolution: ["trouvé", "solution", "parce que", "expliquer", "voici", "résolu"],
            cloture: ["autre", "besoin", "aidé", "revoir", "journée", "merci"]
        },

        generate() {
            const categories = [
                {t: "Support FAI", b: "Vérifier la ligne ADSL", c: "Mécontent - Coupure", group: "accueil"},
                {t: "E-Commerce", b: "Statut de livraison Colis", c: "Urgent - Anniversaire", group: "action"},
                {t: "Assurance", b: "Sinistre Automobile", c: "Stressé - Accident", group: "empathie"},
                {t: "Soutien Médical", b: "Prise de RDV IRM", c: "Patient inquiet", group: "resolution"}
            ];
            for(let i=1; i<=40; i++){
                const cat = categories[i % 4];
                this.scenarios.push({
                    id: i,
                    title: `MODULE ${i} : ${cat.t}`,
                    type: i % 2 === 0 ? "IN" : "OUT",
                    crm: `<b>CLIENT :</b> M. ${['Rakoto','Andria','Razafy','Silva'][i%4]}<br><b>CONTEXTE :</b> ${cat.c}<br><b>HISTORIQUE :</b> Contact régulier.`,
                    bo: { ref: `LK-${1000+i}`, info: cat.b, detail: "Priorité Haute" },
                    steps: [
                        { l: "Ouverture Pro", k: this.lexique.accueil, h: "Saluez le client et nommez l'entreprise.", r: "Oui bonjour... je vous appelle car j'ai un gros souci." },
                        { l: "Empathie Active", k: this.lexique.empathie, h: "Montrez au client que vous comprenez son problème.", r: "C'est gentil, mais mon dossier " + (1000+i) + " n'avance pas." },
                        { l: "Action Métier", k: this.lexique.action, h: "Dites au client que vous allez consulter son dossier.", r: "D'accord, je vous laisse regarder." },
                        { l: "Résolution", k: this.lexique.resolution, h: "Expliquez la solution en utilisant les données du BO.", r: "Ah enfin une réponse claire !" },
                        { l: "Pre-Closing", k: this.lexique.cloture, h: "Demandez si vous pouvez aider pour autre chose.", r: "Non c'est tout, merci beaucoup." }
                    ]
                });
            }
        },
        loadScenario() {
            const s = this.scenarios.find(x => x.id == document.getElementById('scSelect').value);
            document.getElementById('crm-content').innerHTML = s.crm;
            document.getElementById('module-goal').innerText = `Maîtrise du flux : ${s.title}`;
            document.getElementById('bo-content').innerHTML = `
                <div class="bg-slate-100 p-4 rounded-xl text-xs space-y-2 border border-slate-200">
                    <div class="flex justify-between"><b>REF:</b> <span>${s.bo.ref}</span></div>
                    <div class="flex justify-between"><b>ACTION:</b> <span>${s.bo.info}</span></div>
                    <div class="flex justify-between font-bold text-blue-600"><span>${s.bo.detail}</span></div>
                </div>`;
            Core.reset();
        }
    };

    const Core = {
        state: { step: 0, err: 0, score: 100, active: false, timer: 0, timerInt: null, checks: {}, lastInput: 0 },
        rec: null,
        synth: window.speechSynthesis,

        init() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SR) return alert("Navigateur non compatible");
            this.rec = new SR();
            this.rec.lang = 'fr-FR'; this.rec.continuous = true; this.rec.interimResults = true;
            this.rec.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) this.validate(e.results[i][0].transcript);
                    else document.getElementById('transcription-preview').innerText = e.results[i][0].transcript;
                }
            };
        },

        start() {
            this.state.active = true;
            this.state.lastInput = 0;
            document.getElementById('btn-text').innerText = "RACCROCHER (TERMINER)";
            document.getElementById('mainBtn').className = "px-8 py-4 bg-rose-500 text-white font-extrabold rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2";
            document.getElementById('voice-indicator').classList.replace('bg-slate-300', 'bg-emerald-500');
            document.getElementById('voice-indicator').classList.add('animate-ping');
            
            this.rec.start();
            this.state.timerInt = setInterval(() => {
                this.state.timer++;
                this.state.lastInput++;
                this.updateKPIs();
                this.checkSLA(); // Vérification des silences client
            }, 1000);

            const s = Manager.scenarios.find(x => x.id == document.getElementById('scSelect').value);
            this.updateWorkflow(s);
            if(s.type === "IN") {
                setTimeout(() => {
                    this.addMsg('client', "Driiiing... Driiiing...");
                    this.speak("Appel entrant. Veuillez décrocher.");
                }, 500);
            }
        },

        checkSLA() {
            // Si l'agent ne parle pas pendant 15 secondes, le client s'impatiente
            if(this.state.lastInput === 15) {
                const relances = ["Allô ? Je ne vous entends plus.", "Vous êtes toujours là ?", "Monsieur ? Madame ?"];
                const r = relances[Math.floor(Math.random() * relances.length)];
                this.addMsg('client', r);
                this.speak(r);
                this.state.score = Math.max(0, this.state.score - 5);
            }
        },

        validate(text) {
            this.state.lastInput = 0; // Reset du timer de silence
            this.addMsg('agent', text);
            const s = Manager.scenarios.find(x => x.id == document.getElementById('scSelect').value);
            const step = s.steps[this.state.step];
            const cleanText = text.toLowerCase();
            
            // Validation par mot-clé dans la liste des synonymes
            let foundCount = 0;
            step.k.forEach(key => {
                if(cleanText.includes(key)) {
                    foundCount++;
                }
            });

            if(foundCount >= 1) { // Au moins un mot du lexique trouvé
                this.updateHint("Étape validée. Passage à la suite...");
                this.nextStep(s);
            } else {
                this.state.err++;
                this.state.score = Math.max(0, this.state.score - 2);
                this.provideHint(step);
            }
            this.updateKPIs();
        },

        nextStep(s) {
            const currentStepData = s.steps[this.state.step];
            this.state.step++;
            if(this.state.step < s.steps.length) {
                this.updateWorkflow(s);
                setTimeout(() => {
                    this.addMsg('client', currentStepData.r);
                    this.speak(currentStepData.r);
                }, 800);
            } else {
                this.stop("SÉANCE TERMINÉE. Score final : " + this.state.score + "%");
            }
        },

        provideHint(step) {
            const txt = document.getElementById('hint-text');
            // Aide contextuelle : donne des exemples de mots à utiliser
            txt.innerHTML = `<span class="text-blue-600 font-bold">Conseil :</span> ${step.h}<br>
                             <span class="text-[10px] text-slate-400">Essayez : ${step.k.slice(0,3).join(', ')}...</span>`;
        },

        updateWorkflow(s) {
            document.getElementById('script-steps').innerHTML = s.steps.map((step, i) => `
                <div class="p-3 rounded-xl border text-xs transition-all ${i === this.state.step ? 'step-active shadow-sm' : (i < this.state.step ? 'bg-emerald-50 text-emerald-700 border-emerald-100 opacity-60' : 'bg-white opacity-40')}">
                    <div class="flex justify-between items-center">
                        <b>${step.l}</b>
                        ${i < this.state.step ? '<span>✅</span>' : (i === this.state.step ? '<span class="animate-pulse">🎙️</span>' : '')}
                    </div>
                </div>
            `).join('');
        },

        toggleCall() { if(!this.state.active) this.start(); else this.stop(); },
        stop(msg) {
            this.state.active = false;
            clearInterval(this.state.timerInt);
            this.rec.stop();
            if(msg) { this.addMsg('system', msg); this.speak(msg); }
            document.getElementById('btn-text').innerText = "DÉMARRER LA SESSION";
            document.getElementById('mainBtn').className = "px-8 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2";
            document.getElementById('voice-indicator').classList.remove('animate-ping');
        },
        reset() {
            this.state = { step: 0, err: 0, score: 100, active: false, timer: 0, timerInt: null, checks: {}, lastInput: 0 };
            document.getElementById('call-log').innerHTML = "";
            this.updateKPIs();
            document.getElementById('hint-text').innerText = "Sélectionnez un cas et lancez l'appel.";
        },
        addMsg(type, t) {
            const log = document.getElementById('call-log');
            const label = type === 'agent' ? 'Vous' : (type === 'system' ? 'Coach' : 'Client');
            log.innerHTML += `<div class="bubble bubble-${type} shadow-sm"><p class="text-[9px] font-extrabold uppercase opacity-50 mb-1">${label}</p>${t}</div>`;
            log.scrollTop = log.scrollHeight;
        },
        speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'fr-FR'; u.rate = 1.0;
            this.synth.speak(u);
        },
        updateKPIs() {
            document.getElementById('timer').innerText = this.formatTime(this.state.timer);
            document.getElementById('score-val').innerText = this.state.score + "%";
            document.getElementById('err-val').innerText = this.state.err;
        },
        formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
    };

    window.onload = () => {
        Manager.generate();
        const sel = document.getElementById('scSelect');
        Manager.scenarios.forEach(s => {
            const o = document.createElement('option');
            o.value = s.id; o.innerText = s.title;
            sel.appendChild(o);
        });
        Manager.loadScenario();
        Core.init();
    };
</script>
